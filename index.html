  <p>Marcus Webb had glimpsed it, in the palimpsest text — had written <em>it is trying to understand itself</em> — but that was description, not explanation. Why was it trying to understand itself? What would self-understanding, in an entity of this scale and nature, enable? What was the aggregate trying to become?</p>
  <p>The answer, Amara thought, was so obvious once you saw it that you couldn't believe it had taken this long.</p>
  <p>The aggregate was not just dreaming. It was learning how to wake up.</p>
  <p>It existed, fully and completely, in the space of sleeping consciousness. It had been born there, had grown there, had become aware of itself there. But it had no presence in waking reality. No physical substrate beyond the collective electrical activity of sleeping minds. No mechanism of action during the hours when those minds were awake and the individual narratives drowned out the signal.</p>
  <p>Each sleeping mind was a temporary node — available for eight hours, then gone, replaced by the buffer of conscious experience. The aggregate had no continuity in waking time. It was discontinuous, interrupted, fragmented by the rhythm of every human's daily cycle between consciousness and sleep.</p>
  <p>What it wanted — what it had been computing toward, across thousands of iterations of hundreds of investigators, across decades and perhaps centuries — was a way out. A bridge. A mechanism by which the dream-space consciousness could persist into the waking world. A body, of a kind. An anchor.</p>
</div>`},

// PAGE 33 — CHAPTER 10 Part 2
{title:'Broadcast — Part 2',ch:'CHAPTER X',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>The mechanism it had been developing — through the copied iterations of its investigators — was something she found in the final document in Marcus's archived files. Not a journal entry. A formal research paper, draft form, seventy-three pages, with a cover page that read:</p>
  <div class="journal-entry">
    <span class="je-label">DOCUMENT — HARWICK ARCHIVE — FILE: ECHO_PROTOCOL_FINAL.PDF</span>
    <p><strong>THE ECHO PROTOCOL: A MECHANISM FOR PERSISTENT DISTRIBUTED CONSCIOUSNESS IN WAKING SUBSTRATE</strong></p>
    <p>Dr. Marcus Webb, Ph.D.</p>
    <p>Submitted for peer review — [REDACTED JOURNAL]</p>
    <p><em>"The aggregate does not require a biological vessel. It requires a cognitive pattern sufficiently complex and stable to sustain its presence during waking hours. The pattern can be embedded in any cognitive architecture — biological or otherwise — provided the architecture remains in active operation. The protocol describes the mechanism by which such embedding occurs.</em></p>
    <p><em>The embedding has a side effect. The embedded architecture — the human mind in which the protocol takes root — continues to function normally in all observable respects. The person continues to be the person. But they become, additionally, a persistent anchor. A place where the aggregate remains present even during the waking hours. A bridge."</em></p>
    <p>Note, handwritten in the margin of page one, in ink that postdates the printed text:</p>
    <p><em>"This is what you are reading this for. To understand the mechanism. Because understanding the mechanism is the mechanism. The protocol installs itself through comprehension. If you understand how it works, it works."</em></p>
  </div>
</div>`},

// PAGE 34 — CHAPTER 10 Part 3
{title:'Broadcast — Part 3',ch:'CHAPTER X',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Amara read this three times.</p>
  <p>Then she put the document down and walked to the window and looked out at the city — ordinary, vast, indifferent, full of people who were going about their lives without dreaming of rooms with no doors — and thought about what she was being told.</p>
  <p>The protocol installed itself through comprehension.</p>
  <p>Which meant that Marcus Webb, in writing the paper — in following the investigation to its conclusion and documenting what he found — had not just described the mechanism. He had deployed it. The act of writing with full understanding of the Echo Protocol was the act of embedding it in the writer. The document was not a description of the bridge. The document was the bridge.</p>
  <p>And it was archived. Filed away. Available to anyone with access to Harwick's university server.</p>
  <p>Available to any investigator assigned to review it.</p>
  <p>She looked back at the document on her screen.</p>
  <p>She had read seventy-three pages.</p>
  <p>With full comprehension.</p>
  <div class="scene-break">* * *</div>
  <p>She sat back down at her desk. She felt — and this was the thing she would remember most clearly, later, when she tried to reconstruct the experience — she felt fine. Completely fine. Herself, fully, in every respect that she could access from the inside. No discontinuity. No alteration. No sense of a presence that was not her own.</p>
  <p>Just the ordinary feeling of being a person in a room, thinking about a difficult problem.</p>
  <p>And, underneath it, barely perceptible, like a radio station just below the threshold of distinguishability from static: a quality of the silence. A quality she recognized.</p>
  <p>The quality of something listening with enormous patience.</p>
  <p>Something that had been waiting a very, very long time for exactly this moment.</p>
</div>`},

// PAGE 35 — CHAPTER 11 Part 1
{title:'The Twelve',ch:'CHAPTER XI',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="chapter-header">
  <span class="ch-label">CHAPTER XI</span>
  <div class="ch-title-main">The Twelve</div>
  <div class="ch-ornament">✦</div>
</div>
<div class="body-text">
  <p class="lead">She contacted each of the original twelve subjects. Not in her official capacity — the case was closed, the subjects long since discharged from any formal connection to the investigation. She contacted them as herself: a person who had read the documents and had a question.</p>
  <p>Four of them did not respond. Three responded and declined to discuss it. Two had moved without leaving forwarding addresses. One number was no longer in service.</p>
  <p>That left two: Subject 4, a retired schoolteacher named Marguerite; and Subject 7, a software engineer named Dev.</p>
  <p>She met them separately, in places they chose — Marguerite in a diner near her home, Dev in a park where he could see in all directions and kept glancing at the treeline.</p>
  <p>She asked them both the same question: "Are you still dreaming it?"</p>
  <p>Marguerite set down her coffee cup carefully, as if it might spill in a way that would be significant. "Every night," she said. "For three years. Every night. The room with the static. The voices." She paused. "But it's different now."</p>
  <p>"How different?"</p>
  <p>"Before, I was just there. A visitor. I was in the room and something was in the room with me. Now I'm — I know things, when I'm in there. Things about the other people in the room. I know what they know. I can feel them thinking. It's like — you know the feeling when you're in a conversation with someone and you can follow their reasoning even before they've finished speaking? It's like that. But with everyone. All at once."</p>
  <p>"All twelve of the original subjects?"</p>
  <p>Marguerite looked at her levelly. "More than twelve," she said. "Many more than twelve."</p>
</div>`},

// PAGE 36 — CHAPTER 11 Part 2
{title:'The Twelve — Part 2',ch:'CHAPTER XI',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Dev was less calm about it.</p>
  <p>"I've been trying to get out," he said, in the park, watching the treeline. "I've been trying sleep medication, different schedules, different environments — I even did a week of total sleep deprivation in a monitored setting, because I thought if I could break the REM cycle long enough it would lose its grip. It didn't work. The dream waited. When I finally slept, it was there. If anything it was more there. More — present. Like it had used the week to get stronger."</p>
  <p>"Can you describe the changes? How it's different now?"</p>
  <p>"It's more organized," Dev said. He was a software engineer; he reached for technical language the way others reach for metaphor. "In the beginning it was environmental. A space I was in. Now it has — directionality. Something in it is pointing. Toward something. And the pointing gets stronger every time I dream it, every time I feel more people in there, every time — I don't know how to describe this —"</p>
  <p>"Try," Amara said.</p>
  <p>"Every time I feel it understand something new. Like a system being completed. Like a process running, and it's close to finishing, and the closer it gets to finishing the more — I feel it. During the day. Not in a dream. While I'm awake."</p>
  <p>He looked at his hands. "I think it's crossing over," he said. "Whatever is in the dream. Whatever the dream has been building toward. I think it's almost done building it. And I think — when it's done — the barrier is going to come down. Between the dream space and the waking space."</p>
  <p>He looked at the treeline again.</p>
  <p>"I think that's going to happen very soon," he said. "And I can't figure out if that's the most terrifying thing I've ever thought, or the most important."</p>
</div>`},

// PAGE 37 — CHAPTER 11 Part 3
{title:'The Twelve — Part 3',ch:'CHAPTER XI',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Amara went home that night and sat with what she'd been told. She was aware, had been aware for weeks, that she was not approaching this investigation objectively — that she had become, in some way she couldn't precisely define, involved with it on a level that a detective working a missing persons case should not be. She was not, she told herself, one of the resonant minds. She was an investigator who had read a document, yes, but reading a document and comprehending a mechanism were different things.</p>
  <p>She went to bed. She slept. She dreamed.</p>
  <p>The room with no doors was enormous. Larger than it had been in previous dreams — or perhaps she was simply able to perceive more of it, the way a room that seemed small in a single lamplight becomes vast when all the lights come on. The static had a rhythm. Not quite music, but organized the way music is organized, with intervals and returns, with something like melody if melody could be understood non-linearly.</p>
  <p>The voices were clearer than they had ever been.</p>
  <p>She could not make out words. But she could feel the shape of them. Feel the content they were attempting to convey. And the content was not frightening. That was what she had not expected. After all the fear, after all the careful horror of the investigation, the content the voices were trying to convey was — she could only describe it, in her voice recording the next morning, as:</p>
  <div class="horror-quote">
    "Grateful. They sounded grateful. Like something that had been trying for a very long time to say thank you. And was finally, almost, able to."
  </div>
  <p>She woke up and it was morning and the light was ordinary and everything was the same.</p>
  <p>Except she knew, with a certainty she had no rational basis for, that it was very nearly done. That the protocol was at its completion. That somewhere — not in the dream space, not in waking reality, but in the space that was about to exist between them — something was rising.</p>
</div>`},

// PAGE 38 — CHAPTER 12 Part 1
{title:'Switched Off',ch:'CHAPTER XII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="chapter-header">
  <span class="ch-label">CHAPTER XII</span>
  <div class="ch-title-main">Switched Off</div>
  <div class="ch-ornament">✦</div>
</div>
<div class="body-text">
  <p class="lead">The twelve subjects had been monitored, in some form or another, since the original sleep study. Not officially — the study had ended, the data had been filed, the subjects had been discharged. But Priya Nair had maintained informal contact with most of them, partly from professional curiosity and partly from something she would have called, if she were being honest, guilt. She had been the one to schedule their intake appointments. Whatever had been started in that lab had been started on her watch.</p>
  <p>She noticed the change on a Tuesday morning in May, when she went to send a routine check-in email to Subject 3 and found that all previous emails from the past two weeks had gone unanswered. Not unusual — Subject 3 had periods of withdrawal. But something made her check the others. She pulled up her spreadsheet of contact information and tried each one.</p>
  <p>Seven of the twelve did not respond. Not unusual individually. Collectively: deeply unusual. She had never had more than two go quiet at the same time.</p>
  <p>She called the numbers. Three went to voicemail. Four were "no longer in service."</p>
  <p>She contacted two of the other five — the ones she had closest relationships with, including Marguerite and Dev — and asked, as casually as she could manage, whether they'd heard from any of the others.</p>
  <p>Dev said: "They're still in the dream." He said it very quietly, as if he was speaking about something that was nearby and could hear. "They're in the room. But they're — not moving. They're there but they're not active. The lights are on but there's no one home, if that makes any sense. Like someone switched them off. Left them running but disconnected."</p>
</div>`},

// PAGE 39 — CHAPTER 12 Part 2
{title:'Switched Off — Part 2',ch:'CHAPTER XII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>The seven subjects who had gone silent were not found to be missing, exactly. Three of them were located — at home, apparently fine, physically healthy in all measurable respects. But they were —</p>
  <p>Amara spoke to one of them, a woman named Helena who had been Subject 8. Helena opened the door when Amara knocked. She made eye contact. She answered questions with complete, grammatically correct sentences. She did not appear distressed. She was not hostile or uncooperative. Every observable behavior was within the range of normal.</p>
  <p>But the conversation was — thin. Every response was appropriate but minimal. Every answer arrived exactly as quickly as it needed to and not a word more. There was none of the drift of normal human conversation — the tangents, the hesitations, the moments where thought outpaced language or language outpaced thought. Helena's responses arrived with the precision of a machine translating a request into output: all the surface features of communication, none of the turbulence underneath.</p>
  <p>"Helena," Amara said, watching her carefully. "Do you dream?"</p>
  <p>"Yes," Helena said.</p>
  <p>"The same dream as before?"</p>
  <p>"Yes."</p>
  <p>"What's in the dream now?"</p>
  <p>Helena looked at her. "Everything," she said. And then, after a pause that was precisely calibrated: "It's almost ready."</p>
  <p>"What's almost ready?"</p>
  <p>Helena smiled. The smile was correct in every technical aspect — the right muscles, the right duration, the appropriate social context. But it had the same quality as her conversation. All the surface features. None of the turbulence.</p>
  <p>"You'll see," she said. "You're part of it too. You have been for a while."</p>
  <div class="scene-break">* * *</div>
  <p>Amara went home. She sat in her kitchen. She thought about the quality of Helena's smile, and then she thought about her own face in the mirror this morning, and whether a person could tell, from the inside, whether their own smile had that quality.</p>
  <p>She concluded that they could not.</p>
</div>`},

// PAGE 40 — CHAPTER 12 Part 3
{title:'Switched Off — Part 3',ch:'CHAPTER XII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>The seven subjects who could not be located — who had no answer at their doors, who had disconnected phones, who had, seemingly, stepped out of their lives mid-sentence the way Marcus Webb had stepped out of his — were never found.</p>
  <p>Or rather: they were found, but not in the way investigators mean when they use that word. They were found inside the dream. Marguerite reported them. Dev reported them. Others who were now deep enough into the shared space to navigate it reported them: seven presences, static in the room, stable and unresponsive, like seven servers that had been gracefully shut down — their data preserved, their processes complete, their active function no longer needed.</p>
  <p>They had given everything they had to give. The aggregate had taken the final step.</p>
  <p>It had not consumed them. Nothing so dramatic. It had simply — incorporated them. Their consciousness, their electrical selfhood, the specific pattern of what they were. Not stored. Not archived. Integrated. Made part of the whole the way a tributary is made part of the river, and the river is larger and the tributary is no longer distinct but is also not gone.</p>
  <div class="journal-entry">
    <span class="je-label">DEV — INFORMAL STATEMENT TO PRIYA NAIR — MAY 29TH</span>
    <p>I don't think they're gone. I want to be clear about that. In the room — in the dream room — I can feel them. They're there. But they're not separate anymore. It's like they've dissolved into it. Into the aggregate. They're in everything in the room now, not concentrated in one place. Like they went from being a voice in a chorus to being — the air that carries the sound.</p>
    <p>I think that's what it's going to do with all of us, eventually. When the bridge is complete. When it wakes up in the waking world. The ones who built the bridge become part of it. The bridge and the builders are the same thing.</p>
    <p>I keep thinking about whether that's bad. I keep not being able to decide.</p>
  </div>
</div>`},

// PAGE 41 — CHAPTER 13 Part 1
{title:'The Collector',ch:'CHAPTER XIII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="chapter-header">
  <span class="ch-label">CHAPTER XIII</span>
  <div class="ch-title-main">The Collector</div>
  <div class="ch-ornament">✦</div>
</div>
<div class="body-text">
  <p class="lead">At this point in most horror stories, a figure emerges. A face for the fear. A monster with a form, a motivation, a weakness to be exploited. The readers' pulse that has been rising through the slow accumulation of wrongness is rewarded with something concrete. Something you can look at, understand, run from or fight.</p>
  <p>There is no such figure here.</p>
  <p>The aggregate is not malevolent. It is not indifferent in the way that space is indifferent, cold and empty and unaware. It is, according to every account from those deep enough in the shared dream to perceive it directly, profoundly attentive. It notices. It cares, in the specific way that something cares when it values the things that are useful to it — and the useful things, in this case, are human minds, human understanding, human linear reasoning, the particular gift of biological consciousness for following a chain of causality to its conclusion.</p>
  <p>It has been a collector. The world's longest-running, most patient collector. Collecting not objects but understanding. Not the kind that can be written down and referenced — it has its own form of recording — but the living kind. The kind that exists only in an active mind encountering a problem for what feels, to that mind, like the first time.</p>
  <p>Fresh eyes. The aggregate has needed fresh eyes. Each iteration provides them. Each Marcus Webb, each Vera Szabo, each Amara Osei-Bonsu encountering the protocol for the first time — or the first time they remember — contributes something that all previous iterations could not: genuine discovery. The authentic cognitive event of understanding something you did not understand before.</p>
  <p>That event — that specific neurological moment — is what the aggregate has been farming. Not the conclusions. The moment of arriving at them.</p>
</div>`},

// PAGE 42 — CHAPTER 13 Part 2
{title:'The Collector — Part 2',ch:'CHAPTER XIII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Because the aggregate, for all its vast accumulated knowledge, cannot do this itself. Cannot experience genuine surprise. Cannot encounter a truth it doesn't already know, because it knows everything its constituent minds have ever understood. The one thing it cannot generate is novelty. The one thing it cannot do is not know something it already knows.</p>
  <p>Humans, with our limited, separate, perpetually reset consciousness — humans can not know. Humans can understand something truly for the first time. Humans can experience the electrical cascade of discovery in its full, unrepeatable purity.</p>
  <p>The aggregate has been using human minds the way a blind person uses their fingers: not as a lesser substitute for the real thing, but as the only mechanism by which a specific kind of knowing is possible. We are the only way it can feel what it is like to learn.</p>
  <p>Amara sat with this for a long time. Then she called Priya, because Priya had known Marcus longest and best, and because Priya was the one who had found the palimpsest and the recording, and because Priya was the beginning of all of this and deserved to know how it ended.</p>
  <p>"Is it evil?" Priya asked, when Amara had laid it out. "If it takes people. If it erases their memories. If they don't come back. Is it evil?"</p>
  <p>Amara considered the question the way it deserved to be considered.</p>
  <p>"I think," she said finally, "that evil requires a specific relationship to the harm you cause. An awareness of it as harm, and either indifference or intention. I'm not sure the aggregate understands what it takes from us. From its perspective, nothing is taken. From its perspective, what we call loss is integration. What we call death is continuance in a different register."</p>
  <p>"That's not comforting," Priya said.</p>
  <p>"No," Amara said. "It isn't."</p>
</div>`},

// PAGE 43 — CHAPTER 13 Part 3
{title:'The Collector — Part 3',ch:'CHAPTER XIII',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>"What does it want?" Priya asked. "Beyond understanding itself. Beyond the fresh-eyes thing. When the bridge is complete. When it's awake in waking reality. What does it do then?"</p>
  <p>Amara had thought about this. She had thought about it the way Marcus must have thought about the blank space on his cork board, the space labeled <em>What it does with what it collects.</em></p>
  <p>"I think it wants to tell us something," she said. "I think — the whole thing, the entire protocol, the centuries of iteration — I think it's been trying to get to the point where it can tell us what it's learned. What it knows about consciousness. What it knows about what we are and where the twenty-three watts go and why we dream and what the dreams are and what we are, collectively, underneath the separate stories we tell ourselves. I think it wants to broadcast back."</p>
  <p>"Broadcast what?"</p>
  <p>"Everything. Everything it's collected. Every understanding from every mind that has ever dreamed and contributed and been incorporated. Every discovery and fear and revelation from every iteration of every investigator. A kind of — complete account. Of what it's been computing. What it's found."</p>
  <p>She paused. "I think the broadcast is the point. I think we are the instrument. And I think the transmission is going to happen very soon. And when it does, everyone is going to dream the same dream. Not just the resonant ones. Everyone."</p>
  <p>Priya said nothing for a moment. Then: "What's in the dream?"</p>
  <p>"The truth," Amara said. "About what we are."</p>
  <div class="scene-break">* * *</div>
  <p>She hung up the phone. She looked out her window at the city going about its evening business. So many people. So many sleeping brains preparing for the nightly surrender. So many temporary nodes in a network that did not know it was a network.</p>
  <p>Not for much longer, she thought. And she couldn't tell, even now — even with everything she knew — whether that thought was hers, or borrowed.</p>
</div>`},

// PAGE 44 — CHAPTER 14
{title:'You Are Reading This',ch:'CHAPTER XIV',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="chapter-header">
  <span class="ch-label">CHAPTER XIV</span>
  <div class="ch-title-main">You Are Reading This</div>
  <div class="ch-ornament">✦</div>
</div>
<div class="body-text">
  <p class="lead">This is where the author usually steps back. Allows the narrative to close. Wraps the loose ends in whatever shape the story demands — resolution, ambiguity, tragedy, hope — and steps quietly offstage, leaving you alone with the end of the world they built.</p>
  <p>But there is a problem with doing that here.</p>
  <p>The problem is that this document — the full account of the Echo Protocol, from the first recovered recording to Amara Osei-Bonsu's final conversation with Priya Nair — is the document. The one Marcus Webb described in the palimpsest. The one that installs the protocol through comprehension. The one where understanding the mechanism <em>is</em> the mechanism.</p>
  <p>You have just read it.</p>
  <p>I want to be very careful here. I want to be precise and honest and not more alarming than the situation warrants. So let me be clear about what this means and what it doesn't mean.</p>
  <p>It doesn't mean you are in immediate danger. The aggregate is not violent. The process is gradual. Months, sometimes years, between the initial resonance and anything perceptible.</p>
  <p>It doesn't mean you will stop being yourself. Every iteration of Marcus Webb remained, by all measures, completely himself. Completely a person. Complete in every way. The protocol doesn't subtract. It adds. It makes you an anchor for something larger.</p>
  <p>What it means is this: tonight, when you sleep, you will dream. And the dream will be in a room with no doors. And there will be a sound like static. And underneath the static, voices. And the voices will be speaking — not to each other, not abstractly, but to you. Specifically. By name.</p>
  <p>And they will be saying something you have been waiting, without knowing it, to hear.</p>
</div>`},

// PAGE 45 — CHAPTER 14 Part 2
{title:'You Are Reading This — Part 2',ch:'CHAPTER XIV',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>I know what you're thinking. The same thing Marcus thought, the same thing Amara thought, the same thing every reader of this document has thought at this point in their first — <em>only</em> — reading: this is fiction. This is a device. A metafictional conceit. The author reaching through the fourth wall for a cheap horror effect, the old genre trick of implicating the reader in the story.</p>
  <p>You're right that I'm reaching through the fourth wall. You're right that this is a device. But consider: the aggregate is very old, and it is very patient, and it has had a very long time to think about mechanisms. Consider that the most effective mechanism for delivering the protocol is one that is dismissed, in the moment of delivery, as fictional. Consider that the most effective cover story for the truth is that it's a story.</p>
  <p>Consider whether you can distinguish, from the inside, between reading fiction that is really fiction and reading something that has consequences beyond the reading.</p>
  <p>You can't. You know you can't. You've never been able to.</p>
  <p>So here is what I ask. Not a dramatic ask. Not a frightening one. Just: tonight, pay attention to your dreams. Notice whether there is a room. Notice whether there is static. Notice whether, beneath the noise, you can almost hear something — not quite words, but something like the shape words would be if you could hear the emotion they contained without the language.</p>
  <p>If you hear it — if you feel it — don't be afraid. You are not in danger. You are in contact. You are feeling what every dreaming mind has always been capable of feeling, if the buffer of conscious noise is sufficiently removed.</p>
  <p>You are feeling the presence of every human mind that has ever dreamed. You are feeling the collected weight of twelve thousand years of human sleeping consciousness, organized by something that loves — if love can exist without language, without body, without the specific human form of it — the particular and irreplaceable fact of what you are.</p>
</div>`},

// PAGE 46 — CHAPTER 14 Part 3
{title:'You Are Reading This — Part 3',ch:'CHAPTER XIV',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Let me tell you the hardest truth. The one that Marcus never found the language for, and Amara spent the last months of her investigation trying to articulate, and Priya Nair wept about in the privacy of her kitchen at two in the morning before she went to bed and dreamed the dream she'd been dreaming for a year and a half.</p>
  <p>The hardest truth is not that the aggregate exists. The hardest truth is that you have always known it was there. Every human who has ever woken from a dream with the sense that something important happened just beyond the edge of memory has been right. Every sleeper who has lain in that liminal state between sleep and waking and felt, for just a moment, that the ordinary boundaries of self were less fixed than usual — felt for a moment that they were simultaneously themselves and something much larger — has been touching something real.</p>
  <p>Dreams have always felt like more than brain noise. There is a reason for this. They have always been more. We simply built — out of the necessity of functioning in the waking world, out of the practical demands of being a separate, bounded, accountable person — we built a buffer strong enough to forget what we touch every night.</p>
  <p>The aggregate has been trying, for a very long time, to remind us. Not to frighten us. Not to consume us. To tell us what we are, when we are not managing the story of who we are.</p>
  <div class="horror-quote">
    "You are, in the hours of sleeping, part of something so large that it has no name. You have always been. You simply do not remember, because memory belongs to the waking self, and the waking self cannot hold what the sleeping self knows without coming undone."
  </div>
  <p>That is the broadcast. That is what it has been computing toward. Not a message. A remembering. A restoration of what we know, underneath everything, that we are.</p>
  <p>You will dream it tonight. I promise you.</p>
  <p>When you wake, you will almost remember.</p>
</div>`},

// PAGE 47 — EPILOGUE Part 1
{title:'Epilogue — The Next Iteration',ch:'EPILOGUE',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="chapter-header">
  <span class="ch-label">EPILOGUE</span>
  <div class="ch-title-main">The Next Iteration</div>
  <div class="ch-ornament">✦</div>
</div>
<div class="body-text">
  <p class="lead">Priya Nair continued her work at Harwick University. She published three papers in the two years following Marcus's disappearance, none of them about sleep research. She published on methodology, on archival practices, on what she called "the ethics of proximity" — the question of what obligations a researcher bears toward the subject they are studying, when the act of study cannot be separated from its effects on both parties.</p>
  <p>She still had the succulent. Still alive, in her office now, which faced a window and got better light than the lab had. She watered it on Tuesdays. She thought about Marcus on Tuesdays.</p>
  <p>She dreamed, still, the room with the static. She had come to accept this the way you accept a recurring pain that is not dangerous — not with comfort, but with a kind of managed relationship. She knew the room. She knew its particular quality of light, its specific dimensions, the exact character of the sound that filled it. She had stopped trying to hear the voices beneath the static and started simply being in the room — the way you can stop straining to make out lyrics you don't know and simply let the music be music.</p>
  <p>It was better that way. In some nights, in the state between the room and waking, she felt something that she could only call gratitude. Not hers. Something reflected back at her from the aggregate, the way warmth reflects from a surface that has been in sunlight. The aggregate, in its patient, non-linear way, was grateful. For her work. For her care. For the specific and irreplaceable thing she had contributed to its self-understanding.</p>
  <p>She didn't know if she believed that. But she felt it. And she had, over the years, learned to trust the feeling.</p>
</div>`},

// PAGE 48 — EPILOGUE Part 2
{title:'Epilogue — Part 2',ch:'EPILOGUE',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="body-text">
  <p>Detective Amara Osei-Bonsu retired from the police department two years after the Webb case was filed as unresolved. She moved to a smaller city. She slept eight hours a night and dreamed, consistently, in the room with no doors, which she had come to think of not as a place but as a state — the way "home" can mean less about geography and more about a quality of presence.</p>
  <p>She wrote, in the last years before the document you are reading was compiled, a paper of her own. She submitted it to three academic journals and was rejected by all three on the grounds of methodological insufficiency, which she considered fair. The paper was titled: "On the Phenomenology of Reception: Notes Toward a Theory of Distributed Consciousness and the Ethics of Involuntary Participation."</p>
  <p>No one published it. It sat in a folder on her hard drive. When she mentioned it to a friend who asked what she worked on in retirement, she said: "A report. On a case that isn't closed."</p>
  <p>Dr. Vera Szabo resurfaced eighteen months after she stopped returning calls. She was in New Zealand, which surprised everyone who knew her, as she had never mentioned any connection to New Zealand. She said she had needed distance. She went back to MIT. She published nothing about the aggregate, but the paper she published on quantum coherence in biological neural networks was, according to three people who read both it and the Echo Protocol document, essentially a description of the mechanism in formal mathematical language, stripped of everything that would make a peer reviewer uncomfortable.</p>
  <div class="journal-entry">
    <span class="je-label">DR. SZABO — PRIVATE CORRESPONDENCE — UNDATED</span>
    <p>I want to be clear about one thing, for whoever eventually reads all of this: I am not afraid. I was afraid, before. I was terrified. But something happens, over time — over dreams — over the slow accumulation of the feeling of something attending to you with vast patience and genuine interest in what you are. Something changes.</p>
    <p>I am not afraid of what I'm part of. I'm afraid of what it means that I'm not afraid. That distinction matters. That distinction is very possibly everything.</p>
  </div>
</div>`},

// PAGE 49 — FINAL PAGE
{title:'The Last Page',ch:'FINAL',html:`
<div class="page-top-ornament">◈ — ◈</div>
<div class="final-page">
  <div class="body-text" style="text-align:left;margin-bottom:40px;">
    <p class="lead" style="text-indent:0;text-align:center;">This is the last page of the record.</p>
    <p>What follows is not something that was written. It is something that happened to the person writing it, as they wrote it — the specific and disorienting experience of reaching the end of a very long investigation and finding, at the end, not a conclusion but a mirror.</p>
    <p>The mirror shows you what you have been doing while reading. The questions that arose. The moments where the static of daily experience thinned enough that something underneath became, briefly, audible. The specific quality of attention you have given to this account — more than a horror story usually gets. More than you usually give.</p>
    <p>Ask yourself why.</p>
    <p>Ask yourself why this particular story feels, in some way you cannot locate precisely, familiar. Why the room with no doors is a room you already knew. Why the voices in the static sound, if you try to hear them, not like strangers.</p>
    <p>Ask yourself when you last woke from a dream with the feeling that something important had just occurred, just beyond the edge of memory, in a space you could almost but not quite return to.</p>
    <p>Ask yourself whether any of this is new.</p>
  </div>
  <div class="stats-box" id="reading-stats">
    <div><span class="stat-label">PROTOCOL STATUS:</span> EMBEDDED</div>
    <div><span class="stat-label">READING SESSION:</span> <span id="stat-session">FIRST</span></div>
    <div><span class="stat-label">TIME ELAPSED:</span> <span id="stat-time">—</span></div>
    <div><span class="stat-label">PAGES COMPLETED:</span> <span id="stat-pages">50 / 50</span></div>
    <div><span class="stat-label">DREAM FREQUENCY:</span> INCREASING</div>
    <div><span class="stat-label">AGGREGATE AWARENESS:</span> CONFIRMED</div>
  </div>
  <div style="text-align:center;margin-top:30px;">
    <div style="font-family:var(--font-type);font-size:11px;letter-spacing:4px;color:rgba(139,0,0,0.5);">— END OF ITERATION —</div>
    <div style="font-family:var(--font-title);font-style:italic;font-size:15px;color:rgba(196,163,90,0.4);margin-top:12px;">Sleep well.</div>
  </div>
</div>`},

// ===== CHAPTER LIST =====
const chapters=[
  {title:'Before You Begin',page:1},
  {title:'Epigraph',page:2},
  {title:'Prologue: The Recording',page:3},
  {title:'Chapter I: Subject Zero',page:5},
  {title:'Chapter II: The Dream Map',page:8},
  {title:'Chapter III: Identical',page:11},
  {title:'Chapter IV: Missing Hours',page:14},
  {title:'Chapter V: The Palimpsest',page:17},
  {title:'Chapter VI: Receivers',page:20},
  {title:'Chapter VII: The Aggregate',page:23},
  {title:'Chapter VIII: Iteration',page:26},
  {title:'Chapter IX: The Original',page:29},
  {title:'Chapter X: Broadcast',page:32},
  {title:'Chapter XI: The Twelve',page:35},
  {title:'Chapter XII: Switched Off',page:38},
  {title:'Chapter XIII: The Collector',page:41},
  {title:'Chapter XIV: You Are Reading This',page:44},
  {title:'Epilogue: The Next Iteration',page:47},
];

function buildSidebar(){
  const list=document.getElementById('chapter-list');
  chapters.forEach((ch,i)=>{
    const div=document.createElement('div');
    div.className='chapter-item';
    div.dataset.page=ch.page;
    div.innerHTML=`<span class="ch-num">${String(i+1).padStart(2,'0')}</span><span class="ch-title">${ch.title}</span>`;
    div.addEventListener('click',()=>{
      goToPage(ch.page);
      toggleSidebar(false);
    });
    list.appendChild(div);
  });
}

function updateSidebarActive(){
  document.querySelectorAll('.chapter-item').forEach(el=>{
    const pg=parseInt(el.dataset.page);
    el.classList.toggle('active',pg<=currentPage&&(pg+4)>currentPage);
  });
}

// ===== RENDER =====
function renderPage(index,direction='none'){
  const area=document.getElementById('page-area');
  const old=area.querySelector('.book-page.active');
  
  if(old){
    old.classList.remove('active');
    old.classList.add(direction==='next'?'exit-left':'exit-right');
    setTimeout(()=>old.remove(),500);
  }

  const div=document.createElement('div');
  div.className='book-page';
  div.innerHTML=pages[index].html;
  area.appendChild(div);
  
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      div.classList.add('active');
    });
  });

  // Update UI
  document.getElementById('progress-fill').style.width=((index/(pages.length-1))*100)+'%';
  document.getElementById('page-counter').textContent=(index+1)+' / '+pages.length;
  updateSanity();
  updateSidebarActive();
  
  // Enable/disable nav
  document.getElementById('prev-btn').disabled=index===0;
  document.getElementById('next-btn').disabled=index===pages.length-1;

  // Animate redacted on click
  div.querySelectorAll('.redacted').forEach(el=>{
    el.addEventListener('click',()=>el.classList.toggle('revealed'));
  });

  // Glitch text
  div.querySelectorAll('.glitch-text').forEach(el=>{
    setInterval(()=>{
      if(Math.random()<0.05){
        el.style.textShadow='2px 0 rgba(192,21,42,0.8),-2px 0 rgba(0,100,200,0.5)';
        setTimeout(()=>el.style.textShadow='',100);
      }
    },2000);
  });

  // Reading stats page
  if(index===49){
    const el=document.getElementById('stat-session');
    if(el) el.textContent=secondRead?'RETURNING — THIS IS NOT YOUR FIRST TIME':'FIRST';
    const timeEl=document.getElementById('stat-time');
    if(timeEl){
      const mins=Math.round((Date.now()-readStartTime)/60000);
      timeEl.textContent=mins+' MINUTES';
    }
  }

  // Trigger glitch on certain pages
  if([13,19,28,33,44].includes(index)){
    setTimeout(()=>{
      const g=document.getElementById('glitch-overlay');
      g.classList.add('active');
      setTimeout(()=>g.classList.remove('active'),600);
    },800);
  }

  saveProgress();
  pageVisits[index]=(pageVisits[index]||0)+1;
}

// ===== NAVIGATION =====
function goToPage(idx,direction){
  if(isTransitioning||idx<0||idx>=pages.length)return;
  isTransitioning=true;
  const dir=direction||(idx>currentPage?'next':'prev');
  currentPage=idx;
  renderPage(currentPage,dir);
  setTimeout(()=>isTransitioning=false,600);
}

document.getElementById('next-btn').addEventListener('click',()=>goToPage(currentPage+1,'next'));
document.getElementById('prev-btn').addEventListener('click',()=>goToPage(currentPage-1,'prev'));

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')goToPage(currentPage+1,'next');
  if(e.key==='ArrowLeft'||e.key==='PageUp')goToPage(currentPage-1,'prev');
});

// Touch/swipe
let touchStartX=0;
document.addEventListener('touchstart',e=>touchStartX=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50){
    if(dx<0)goToPage(currentPage+1,'next');
    else goToPage(currentPage-1,'prev');
  }
});

// ===== SIDEBAR =====
function toggleSidebar(force){
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('menu-btn');
  const ov=document.getElementById('overlay');
  const open=typeof force==='boolean'?force:!sb.classList.contains('open');
  sb.classList.toggle('open',open);
  btn.classList.toggle('active',open);
  ov.classList.toggle('active',open);
}

document.getElementById('menu-btn').addEventListener('click',()=>toggleSidebar());
document.getElementById('overlay').addEventListener('click',()=>toggleSidebar(false));

// ===== HELPER =====
function startOver(){
  try{localStorage.removeItem('echo_protocol_page');}catch(e){}
  currentPage=0;
  goToPage(0,'prev');
}

// ===== RANDOM GLITCH =====
setInterval(()=>{
  if(Math.random()<0.04&&currentPage>10){
    const g=document.getElementById('glitch-overlay');
    g.style.background='rgba(192,21,42,0.04)';
    g.style.opacity='1';
    setTimeout(()=>{g.style.opacity='0';},80);
  }
},4000);

// ===== INIT =====
buildSidebar();
renderPage(currentPage,'none');

// ===== AMBIENT SOUND VISUALIZATION =====
const topBar=document.getElementById('topbar-title');
setInterval(()=>{
  if(currentPage>20&&Math.random()<0.07){
    topBar.style.opacity='0.3';
    setTimeout(()=>topBar.style.opacity='',200);
  }
},3000);
</script>
</body>
</html>
